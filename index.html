<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>1TSnakers Website!</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@latest/build/stlite.css" />
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@latest/build/stlite.js";

    mount(
      {
        //pyodideUrl: "https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.mjs",
        requirements: ["requests", "humanize"],
        entrypoint: "app.py",
        files: {
          "app.py": { url: "./app.py" },
          "homepage.py": { url: "./homepage.py" },
          "pages/misc_apps.py": { url: "pages/misc_apps.py" },
          "pages/ollama_models.py": { url: "pages/ollama_models.py" },
          "pages/commit_hall_of_fame.py": { url: "pages/commit_hall_of_fame.py" },
          "eyy.jpg": { url: "./eyy.jpg" },
          "jokes.html": { url: "./jokes.html" },
        },
        streamlitConfig: {
          "server.enableStaticServing": true,
          
          "theme.base": "dark",
          "theme.primaryColor": "#a855f7",
          "theme.backgroundColor": "#0d1117",
          "theme.secondaryBackgroundColor": "#161b22",
          "theme.textColor": "#f0f6fc",
          "theme.linkColor": "#58a6ff",
          
          // Border and styling
          "theme.borderColor": "#30363d",
          "theme.baseRadius": "0.375rem",
          
          // Code styling
          "theme.codeBackgroundColor": "#21262d"
        }
      },
      document.getElementById("root")
    );
  </script>
</body>
</html>
