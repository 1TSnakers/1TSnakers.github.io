<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Joke Widget</title>
  <style>
    @font-face {
      font-family: 'Source Sans';
      src: url('https://cdn.jsdelivr.net/npm/@stlite/browser@latest/build/assets/512f7db3dabc21be.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
    }
    body { margin: 0; }
    #joke { font-size: 0.9rem; color: #9b9c9e; font-family: 'Source Sans', sans-serif; font-weight: 500; }
  </style>
</head>
<body>
  <div id="joke">Loading joke...</div>
  <script type="module">
    import { jokes } from "./jokes.js";
    let lastJoke = "";

    function updateJoke() {
      let joke = jokes[Math.floor(Math.random() * jokes.length)];
      while (joke === lastJoke && jokes.length > 1) {
        joke = jokes[Math.floor(Math.random() * jokes.length)];
      }
      lastJoke = joke;
      document.getElementById("joke").textContent = joke;
    }

    updateJoke();
    setInterval(updateJoke, 10000);
  </script>
</body>
</html>
